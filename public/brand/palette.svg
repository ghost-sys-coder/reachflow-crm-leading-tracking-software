<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 542" width="660" height="542" fill="none">
  <!-- Background -->
  <rect width="660" height="542" rx="12" fill="#fafaf8"/>
  <rect width="660" height="542" rx="12" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Title -->
  <text x="40" y="46" font-family="Inter, ui-sans-serif, system-ui, sans-serif"
    font-size="18" font-weight="700" letter-spacing="-0.3" fill="#111827">ReachFlow — Color System</text>
  <text x="40" y="64" font-family="Inter, ui-sans-serif, system-ui, sans-serif"
    font-size="12" fill="#6b7280">Hex values approximated from OKLCH tokens defined in app/globals.css</text>

  <!-- ── Section 1: Brand Primaries ── -->
  <text x="40" y="96" font-family="Inter, ui-sans-serif, system-ui, sans-serif"
    font-size="11" font-weight="600" letter-spacing="0.6" fill="#6b7280">BRAND PRIMARIES</text>

  <!-- Default Indigo -->
  <rect x="40"  y="108" width="130" height="72" rx="8" fill="#4f46e5"/>
  <text x="40"  y="197" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#111827">Default</text>
  <text x="40"  y="212" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#6b7280">#4f46e5 · Indigo</text>

  <!-- Midnight Violet -->
  <rect x="180" y="108" width="130" height="72" rx="8" fill="#7c3aed"/>
  <text x="180" y="197" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#111827">Midnight</text>
  <text x="180" y="212" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#6b7280">#7c3aed · Violet</text>

  <!-- Sunset Coral -->
  <rect x="320" y="108" width="130" height="72" rx="8" fill="#e8621a"/>
  <text x="320" y="197" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#111827">Sunset</text>
  <text x="320" y="212" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#6b7280">#e8621a · Coral</text>

  <!-- On-brand text -->
  <rect x="460" y="108" width="130" height="72" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="460" y="197" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#111827">On-Brand</text>
  <text x="460" y="212" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#6b7280">#ffffff · White</text>

  <!-- ── Section 2: Semantic Colors ── -->
  <text x="40" y="248" font-family="Inter, ui-sans-serif, system-ui, sans-serif"
    font-size="11" font-weight="600" letter-spacing="0.6" fill="#6b7280">SEMANTIC COLORS</text>

  <!-- Success -->
  <rect x="40"  y="260" width="130" height="72" rx="8" fill="#16a34a"/>
  <text x="40"  y="349" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#111827">Success</text>
  <text x="40"  y="364" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#6b7280">#16a34a · Green</text>

  <!-- Warning -->
  <rect x="180" y="260" width="130" height="72" rx="8" fill="#d97706"/>
  <text x="180" y="349" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#111827">Warning</text>
  <text x="180" y="364" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#6b7280">#d97706 · Amber</text>

  <!-- Destructive -->
  <rect x="320" y="260" width="130" height="72" rx="8" fill="#dc2626"/>
  <text x="320" y="349" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#111827">Destructive</text>
  <text x="320" y="364" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#6b7280">#dc2626 · Red</text>

  <!-- Focus Ring -->
  <rect x="460" y="260" width="130" height="72" rx="8" fill="#4f46e5" fill-opacity="0.1" stroke="#4f46e5" stroke-width="2.5" stroke-dasharray="5 2"/>
  <text x="460" y="349" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#111827">Focus Ring</text>
  <text x="460" y="364" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#6b7280">#4f46e5 · Ring</text>

  <!-- ── Section 3: Neutrals ── -->
  <text x="40" y="400" font-family="Inter, ui-sans-serif, system-ui, sans-serif"
    font-size="11" font-weight="600" letter-spacing="0.6" fill="#6b7280">NEUTRALS (DEFAULT THEME)</text>

  <!-- Foreground -->
  <rect x="40"  y="412" width="130" height="60" rx="8" fill="#111827"/>
  <text x="40"  y="489" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#111827">Foreground</text>
  <text x="40"  y="504" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#6b7280">#111827</text>

  <!-- Muted Foreground -->
  <rect x="180" y="412" width="130" height="60" rx="8" fill="#6b7280"/>
  <text x="180" y="489" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#111827">Muted FG</text>
  <text x="180" y="504" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#6b7280">#6b7280</text>

  <!-- Border -->
  <rect x="320" y="412" width="130" height="60" rx="8" fill="#e5e7eb" stroke="#d1d5db" stroke-width="1"/>
  <text x="320" y="489" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#111827">Border</text>
  <text x="320" y="504" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#6b7280">#e5e7eb</text>

  <!-- Background -->
  <rect x="460" y="412" width="130" height="60" rx="8" fill="#fafaf8" stroke="#e5e7eb" stroke-width="1"/>
  <text x="460" y="489" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#111827">Background</text>
  <text x="460" y="504" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#6b7280">#fafaf8</text>
</svg>
